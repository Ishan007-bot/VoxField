# Render blueprint for the VoxField backend (FastAPI).
# Deploy: push to GitHub, then in Render → "New +" → "Blueprint" → pick this repo.
# Secrets (GCP_CREDENTIALS_JSON, etc.) are set in the Render dashboard, NOT here.
services:
  - type: web
    name: voxfield-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      # Pin Python 3.12 — 3.14 (Render's current default) has no prebuilt wheels
      # for rapidfuzz/numpy etc., forcing slow source builds that fail.
      - key: PYTHON_VERSION
        value: "3.12.10"
      - key: USE_VERTEX
        value: "true"
      - key: USE_CLOUD_SPEECH
        value: "true"
      - key: VERTEX_LOCATION
        value: us-central1
      - key: VERTEX_MODEL
        value: gemini-2.5-flash
      # Set these two in the Render dashboard (mark as secret), do NOT hardcode:
      #   GCP_CREDENTIALS_JSON  = <paste the full service-account JSON>
      #   CORS_ORIGINS          = https://<your-vercel-app>.vercel.app
      - key: GCP_CREDENTIALS_JSON
        sync: false
      - key: CORS_ORIGINS
        sync: false
    # NOTE: Render's FREE tier has no persistent disk. The SQLite DB lives on
    # ephemeral storage and re-seeds 40 assets on each start — so demo-created
    # work orders reset on restart/redeploy. For persistence, use a paid plan
    # (add a `disk:` block + set DB_PATH=/var/data/field_assistant.db) or Postgres.
